<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0f0f0"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Git Command Cheatsheet</text>

  <!-- Section 1: Basic Commands -->
  <rect x="50" y="50" width="700" height="150" fill="#e0e0e0" stroke="#ccc" stroke-width="2"/>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Basic Commands</text>
  <text x="60" y="95" font-family="monospace" font-size="14" fill="#000">git init</text>
  <text x="60" y="115" font-family="Arial, sans-serif" font-size="12" fill="#666">Initialize a new Git repository</text>
  <text x="60" y="135" font-family="monospace" font-size="14" fill="#000">git status</text>
  <text x="60" y="155" font-family="Arial, sans-serif" font-size="12" fill="#666">Check the status of your working directory</text>
  <text x="60" y="175" font-family="monospace" font-size="14" fill="#000">git add .</text>
  <text x="60" y="195" font-family="Arial, sans-serif" font-size="12" fill="#666">Stage all changes for commit</text>

  <!-- Section 2: Committing -->
  <rect x="50" y="220" width="700" height="100" fill="#e0e0e0" stroke="#ccc" stroke-width="2"/>
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Committing</text>
  <text x="60" y="265" font-family="monospace" font-size="14" fill="#000">git commit -m "message"</text>
  <text x="60" y="285" font-family="Arial, sans-serif" font-size="12" fill="#666">Commit staged changes with a message</text>
  <text x="60" y="305" font-family="monospace" font-size="14" fill="#000">git log</text>
  <text x="60" y="325" font-family="Arial, sans-serif" font-size="12" fill="#666">View commit history</text>

  <!-- Section 3: Branching -->
  <rect x="50" y="340" width="700" height="100" fill="#e0e0e0" stroke="#ccc" stroke-width="2"/>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Branching</text>
  <text x="60" y="385" font-family="monospace" font-size="14" fill="#000">git branch</text>
  <text x="60" y="405" font-family="Arial, sans-serif" font-size="12" fill="#666">List branches</text>
  <text x="60" y="425" font-family="monospace" font-size="14" fill="#000">git checkout -b branch-name</text>
  <text x="60" y="445" font-family="Arial, sans-serif" font-size="12" fill="#666">Create and switch to a new branch</text>

  <!-- Section 4: Remote -->
  <rect x="50" y="460" width="700" height="100" fill="#e0e0e0" stroke="#ccc" stroke-width="2"/>
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Remote Repositories</text>
  <text x="60" y="505" font-family="monospace" font-size="14" fill="#000">git remote add origin URL</text>
  <text x="60" y="525" font-family="Arial, sans-serif" font-size="12" fill="#666">Add a remote repository</text>
  <text x="60" y="545" font-family="monospace" font-size="14" fill="#000">git push origin main</text>
  <text x="60" y="565" font-family="Arial, sans-serif" font-size="12" fill="#666">Push changes to remote</text>
  <text x="60" y="585" font-family="monospace" font-size="14" fill="#000">git pull origin main</text>
  <text x="60" y="605" font-family="Arial, sans-serif" font-size="12" fill="#666">Pull changes from remote</text>
</svg>
